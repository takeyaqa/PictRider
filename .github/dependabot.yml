version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    versioning-strategy: increase
    cooldown:
      default-days: 3
    open-pull-requests-limit: 20
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      oxc:
        patterns:
          - "eslint-plugin-playwright"
          - "oxfmt"
          - "oxlint"
          - "oxlint-tsgolint"
      immer:
        patterns:
          - "immer"
          - "use-immer"
      react:
        patterns:
          - "@types/react"
          - "@types/react-dom"
          - "react"
          - "react-dom"
      tailwindcss:
        patterns:
          - "@tailwindcss/*"
          - "tailwindcss"
      vite:
        patterns:
          - "@vitejs/*"
          - "vite"
      vite-pwa:
        patterns:
          - "@vite-pwa/*"
          - "vite-plugin-pwa"
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"
          - "vitest-browser-react"
    ignore:
      - dependency-name: "@takeyaqa/pict-wasm"
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "ci"
      include: "scope"
